<!DOCTYPE html>
<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>

<title>Lobby Multijoueur - Jeu des Points</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0a0f14",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: "Space Grotesk", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .spinner {
            border: 2px solid rgba(19, 127, 236, 0.1);
            border-top: 2px solid #137fec;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-[100dvh] flex flex-col">
<header class="flex items-center justify-between px-6 pt-12 pb-6">
<button class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-900 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">chevron_left</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Multijoueur</h1>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-green-500/10 rounded-full border border-green-500/20">
<span class="material-symbols-outlined text-green-500 text-[16px] font-bold">sensors</span>
<span class="text-xs font-bold text-green-500 tracking-tight">24ms</span>
</div>
</header>
<main class="flex-1 flex flex-col px-6 space-y-8 max-w-md mx-auto w-full">
<section class="flex flex-col items-center text-center space-y-6 pt-4">
<div class="space-y-1">
<span class="text-[10px] font-black tracking-[0.2em] text-slate-400 dark:text-slate-500 uppercase">Héberger une partie</span>
</div>
<div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/60 rounded-3xl p-8 w-full shadow-sm backdrop-blur-sm">
<p class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">Code de session</p>
<h2 class="text-4xl font-bold tracking-[0.2em] text-primary mb-8">6X9K2P</h2>
<button class="flex items-center justify-center gap-2 w-full py-4 px-4 bg-primary text-white font-bold rounded-2xl active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">link</span>
<span>Copier le lien</span>
</button>
</div>
<div class="flex items-center gap-3 py-2">
<div class="spinner"></div>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">En attente d'un adversaire...</span>
</div>
</section>
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800/50"></div>
<span class="flex-shrink mx-6 text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-[0.3em]">OU</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800/50"></div>
</div>
<section class="space-y-4">
<div class="space-y-4">
<label class="block text-[10px] font-black tracking-[0.2em] text-slate-400 dark:text-slate-500 uppercase text-center">Rejoindre une partie</label>
<div class="flex flex-col gap-3">
<input autocomplete="off" class="w-full bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 rounded-2xl px-4 py-5 text-center text-2xl font-bold tracking-[0.3em] focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-700 placeholder:font-medium placeholder:tracking-normal placeholder:text-base uppercase" maxlength="6" placeholder="Entrer un code" spellcheck="false" type="text"/>
<button class="w-full py-4 px-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl active:scale-[0.98] transition-all text-sm uppercase tracking-widest">
                    Se connecter
                </button>
</div>
</div>
</section>
<div class="mt-auto mb-8 p-4 bg-slate-100/50 dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800 rounded-2xl flex items-center gap-4">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden ring-2 ring-primary/20">
<img alt="Avatar Joueur" class="size-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOFGCeAZEmUZEqLNQuiFXxY6azDJhfaajbIXmh0Ybwk5sffBc-PZe_TYViGpywvZZl8zX61BpkvIkje8czqwFLxdhMerL16ZujQ-gDRd7aiLHsLkc5Za-BrM1wLV4BdlAMTXTU4-8-Zda4lducmaKPgXvQ05h1xmNRL7Cq5idzbBcIYZZ6OJIATJZ2U6nhvn1U_WUx24GIKj6B0u0CAPFyPQkZAkp0Gfm_RhTcW59emPqgUmlIPETmJFgOsaOQWcDJF_-S773D6ttj"/>
</div>
<div class="flex-1">
<p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Connecté en tant que</p>
<p class="font-bold text-slate-900 dark:text-slate-100">GrandMaster_99</p>
</div>
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1">verified</span>
</div>
</main>
<nav class="border-t border-slate-200 dark:border-slate-800/50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-xl pb-10 pt-3">
<div class="flex justify-around items-center px-8">
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">grid_view</span>
</a>
<a class="flex flex-col items-center p-2 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">groups</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">leaderboard</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
</a>
</div>
</nav>

</body></html>

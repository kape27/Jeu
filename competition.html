<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jeu des Points - Compétitions</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #07152a;
      color: #d9e6ff;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 14px; font-size: 28px; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card {
      border: 1px solid rgba(100, 154, 255, 0.35);
      border-radius: 14px;
      background: rgba(8, 24, 48, 0.82);
      padding: 14px;
    }
    label { display: block; font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(126, 170, 255, 0.45);
      border-radius: 10px;
      background: #0c1f3a;
      color: #e4eeff;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    textarea { min-height: 68px; resize: vertical; }
    button { cursor: pointer; background: #1f5fd3; border-color: #2b76ff; font-weight: 700; }
    button.secondary { background: #102f5f; }
    button.ghost { background: transparent; }
    .inline { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .event {
      border: 1px solid rgba(123, 177, 255, 0.28);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(3, 15, 33, 0.7);
    }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; border: 1px solid rgba(164, 197, 255, 0.5); }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .small { font-size: 12px; opacity: 0.82; }
    #status { margin: 6px 0 16px; min-height: 18px; }
    .ok { color: #7af7b8; }
    .err { color: #ff97a6; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Comptes, Salons et Compétitions</h1>
    <div id="status" class="small"></div>

    <div class="card">
      <h2>Connexion API</h2>
      <label for="apiBase">Base API</label>
      <input id="apiBase" placeholder="https://jeu-points.onrender.com">
      <button id="saveApi" class="secondary">Enregistrer URL API</button>
      <div class="small">Exemple endpoint: <span class="mono">/api/events</span></div>
    </div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <h2>Compte</h2>
        <div class="inline">
          <div>
            <label for="regPseudo">Pseudo</label>
            <input id="regPseudo" placeholder="Ton pseudo">
          </div>
          <div>
            <label for="regEmail">Email</label>
            <input id="regEmail" placeholder="toi@email.com">
          </div>
        </div>
        <label for="regPassword">Mot de passe</label>
        <input id="regPassword" type="password" placeholder="8 caractères minimum">
        <div class="inline">
          <button id="registerBtn">Créer un compte</button>
          <button id="loginBtn" class="secondary">Connexion</button>
        </div>
        <button id="logoutBtn" class="ghost">Déconnexion</button>
        <div id="meBox" class="small"></div>
      </div>

      <div class="card">
        <h2>Créer un salon</h2>
        <label for="eventName">Nom événement</label>
        <input id="eventName" placeholder="Tournoi du samedi">
        <label for="eventMode">Mode</label>
        <select id="eventMode">
          <option value="classic">Classic</option>
          <option value="tempete">Tempête</option>
          <option value="rapide">Rapide</option>
        </select>
        <div class="inline">
          <div>
            <label for="eventMax">Joueurs max</label>
            <input id="eventMax" type="number" min="2" max="64" value="8">
          </div>
          <div>
            <label for="joinCode">Code salon</label>
            <input id="joinCode" placeholder="ABC123">
          </div>
        </div>
        <label for="eventDesc">Description</label>
        <textarea id="eventDesc" placeholder="Règles de votre compétition"></textarea>
        <div class="inline">
          <button id="createEventBtn">Créer événement</button>
          <button id="joinEventBtn" class="secondary">Rejoindre code</button>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <div class="row">
          <h2 style="margin: 0;">Salons disponibles</h2>
          <button id="refreshEventsBtn" class="secondary" style="width:auto;padding:8px 12px;">Rafraîchir</button>
        </div>
        <div id="eventsList"></div>
      </div>

      <div class="card">
        <h2>Détails salon</h2>
        <div id="selectedEvent">Sélectionne un salon pour voir les joueurs et les matchs.</div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'points.api.base';
    const TOKEN_KEY = 'points.api.token';
    const SELECTED_EVENT_KEY = 'points.api.event';
    const state = {
      apiBase: '',
      token: '',
      user: null,
      events: [],
      selectedCode: ''
    };

    const el = (id) => document.getElementById(id);
    const statusNode = el('status');

    function showStatus(message, isError = false) {
      statusNode.textContent = message || '';
      statusNode.className = `small ${isError ? 'err' : 'ok'}`;
    }

    function normalizeBaseUrl(url) {
      const raw = String(url || '').trim();
      if (!raw) return '';
      return raw.replace(/\/+$/, '');
    }

    function defaultApiBase() {
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        return 'http://localhost:8080';
      }
      return 'https://jeu-points.onrender.com';
    }

    async function api(path, method = 'GET', body = null) {
      if (!state.apiBase) throw new Error('Base API non définie.');
      const headers = { 'Content-Type': 'application/json' };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const response = await fetch(`${state.apiBase}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Erreur API (${response.status})`);
      }
      return data;
    }

    function renderUser() {
      if (!state.user) {
        el('meBox').textContent = 'Non connecté.';
        return;
      }
      el('meBox').innerHTML = `Connecté: <b>${state.user.pseudo}</b> (${state.user.email})`;
    }

    function eventCard(event) {
      return `
        <div class="event">
          <div class="row" style="justify-content:space-between;">
            <b>${event.name}</b>
            <span class="badge">${event.status}</span>
          </div>
          <div class="small">Code: <span class="mono">${event.code}</span> | Mode: ${event.mode}</div>
          <div class="small">Joueurs: ${event.playerCount}/${event.maxPlayers}</div>
          <div class="small">Hôte: ${event.ownerPseudo}</div>
          <button class="secondary" data-open="${event.code}" style="margin-top:8px;">Ouvrir</button>
        </div>
      `;
    }

    function renderEvents() {
      const node = el('eventsList');
      if (!state.events.length) {
        node.innerHTML = '<div class="small">Aucun salon.</div>';
        return;
      }
      node.innerHTML = state.events.map(eventCard).join('');
      node.querySelectorAll('button[data-open]').forEach((btn) => {
        btn.addEventListener('click', () => {
          openEvent(btn.dataset.open);
        });
      });
    }

    function playerRow(player) {
      return `<li>${player.displayName}${player.isHost ? ' (Hôte)' : ''} - ${player.points} pts (${player.wins}V/${player.losses}D)</li>`;
    }

    function matchRow(match, playersById, eventCode, canManage) {
      const a = match.playerAUserId ? (playersById.get(match.playerAUserId) || `#${match.playerAUserId}`) : 'BYE';
      const b = match.playerBUserId ? (playersById.get(match.playerBUserId) || `#${match.playerBUserId}`) : 'BYE';
      const winner = match.winnerUserId ? (playersById.get(match.winnerUserId) || `#${match.winnerUserId}`) : '-';
      const action = canManage && match.status === 'pending'
        ? `<button class="secondary" data-report="${eventCode}:${match.id}" style="width:auto;padding:6px 10px;">Valider résultat</button>`
        : '';
      return `<li>R${match.round} M${match.slot}: ${a} vs ${b} | ${match.status} | Gagnant: ${winner} ${action}</li>`;
    }

    function renderSelected(event) {
      const node = el('selectedEvent');
      if (!event) {
        node.textContent = 'Sélectionne un salon pour voir les joueurs et les matchs.';
        return;
      }
      const me = state.user ? state.user.id : null;
      const meAsPlayer = event.players.find((p) => p.userId === me);
      const canManage = Boolean(meAsPlayer && meAsPlayer.isHost);
      const playersById = new Map(event.players.map((p) => [p.userId, p.displayName]));
      node.innerHTML = `
        <div class="row" style="justify-content:space-between;">
          <b>${event.name}</b>
          <span class="badge">${event.status}</span>
        </div>
        <div class="small">Code: <span class="mono">${event.code}</span></div>
        <div class="small">Mode: ${event.mode} | Hôte: ${event.ownerPseudo}</div>
        <div class="small">Joueurs: ${event.playerCount}/${event.maxPlayers}</div>
        <div class="row" style="margin-top:10px;">
          <button id="joinCurrentBtn" class="secondary">Rejoindre</button>
          <button id="leaveCurrentBtn" class="ghost">Quitter</button>
          <button id="startCurrentBtn">Lancer compétition</button>
        </div>
        <h3>Joueurs</h3>
        <ul>${event.players.map(playerRow).join('')}</ul>
        <h3>Matchs</h3>
        <ul>${(event.matches || []).map((m) => matchRow(m, playersById, event.code, canManage)).join('') || '<li>Aucun match</li>'}</ul>
      `;
      el('joinCurrentBtn').onclick = () => joinEvent(event.code);
      el('leaveCurrentBtn').onclick = () => leaveEvent(event.code);
      el('startCurrentBtn').onclick = () => startEvent(event.code);
      node.querySelectorAll('button[data-report]').forEach((button) => {
        button.onclick = () => reportMatch(button.dataset.report);
      });
    }

    async function refreshMe() {
      if (!state.token) {
        state.user = null;
        renderUser();
        return;
      }
      try {
        const result = await api('/api/auth/me');
        state.user = result.user;
      } catch (_error) {
        state.user = null;
        state.token = '';
        localStorage.removeItem(TOKEN_KEY);
      }
      renderUser();
    }

    async function refreshEvents() {
      const result = await api('/api/events?limit=50');
      state.events = result.events || [];
      renderEvents();
      if (state.selectedCode) {
        await openEvent(state.selectedCode, false);
      }
    }

    async function openEvent(code, persist = true) {
      const result = await api(`/api/events/${String(code || '').trim()}`);
      const event = result.event;
      state.selectedCode = event.code;
      if (persist) localStorage.setItem(SELECTED_EVENT_KEY, state.selectedCode);
      renderSelected(event);
    }

    async function joinEvent(code) {
      await api(`/api/events/${code}/join`, 'POST', {});
      await openEvent(code);
      await refreshEvents();
      showStatus('Salon rejoint.');
    }

    async function leaveEvent(code) {
      await api(`/api/events/${code}/leave`, 'POST', {});
      await openEvent(code);
      await refreshEvents();
      showStatus('Salon quitté.');
    }

    async function startEvent(code) {
      await api(`/api/events/${code}/start`, 'POST', {});
      await openEvent(code);
      await refreshEvents();
      showStatus('Compétition lancée.');
    }

    async function reportMatch(reportKey) {
      const [eventCode, matchId] = reportKey.split(':');
      const winner = prompt('winnerUserId (id numérique du gagnant):');
      if (!winner) return;
      const scoreA = prompt('Score joueur A (optionnel):', '0') || '0';
      const scoreB = prompt('Score joueur B (optionnel):', '0') || '0';
      await api(`/api/events/${eventCode}/matches/${matchId}/result`, 'POST', {
        winnerUserId: Number(winner),
        scoreA: Number(scoreA),
        scoreB: Number(scoreB)
      });
      await openEvent(eventCode);
      await refreshEvents();
      showStatus('Résultat enregistré.');
    }

    async function createEvent() {
      const body = {
        name: el('eventName').value,
        mode: el('eventMode').value,
        maxPlayers: Number(el('eventMax').value || '8'),
        description: el('eventDesc').value
      };
      const result = await api('/api/events', 'POST', body);
      showStatus(`Salon créé: ${result.event.code}`);
      await refreshEvents();
      await openEvent(result.event.code);
    }

    async function register() {
      const body = {
        pseudo: el('regPseudo').value,
        email: el('regEmail').value,
        password: el('regPassword').value
      };
      const result = await api('/api/auth/register', 'POST', body);
      state.token = result.token;
      localStorage.setItem(TOKEN_KEY, state.token);
      await refreshMe();
      showStatus('Compte créé et connecté.');
    }

    async function login() {
      const body = {
        email: el('regEmail').value,
        password: el('regPassword').value
      };
      const result = await api('/api/auth/login', 'POST', body);
      state.token = result.token;
      localStorage.setItem(TOKEN_KEY, state.token);
      await refreshMe();
      showStatus('Connexion réussie.');
    }

    async function logout() {
      if (state.token) {
        try { await api('/api/auth/logout', 'POST', {}); } catch (_e) {}
      }
      state.token = '';
      state.user = null;
      localStorage.removeItem(TOKEN_KEY);
      renderUser();
      showStatus('Déconnecté.');
    }

    async function boot() {
      state.apiBase = normalizeBaseUrl(localStorage.getItem(API_KEY) || defaultApiBase());
      state.token = localStorage.getItem(TOKEN_KEY) || '';
      state.selectedCode = localStorage.getItem(SELECTED_EVENT_KEY) || '';
      el('apiBase').value = state.apiBase;
      renderUser();

      el('saveApi').onclick = async () => {
        state.apiBase = normalizeBaseUrl(el('apiBase').value || defaultApiBase());
        localStorage.setItem(API_KEY, state.apiBase);
        await refreshMe();
        await refreshEvents();
        showStatus('URL API mise à jour.');
      };

      el('registerBtn').onclick = () => register().catch((e) => showStatus(e.message, true));
      el('loginBtn').onclick = () => login().catch((e) => showStatus(e.message, true));
      el('logoutBtn').onclick = () => logout().catch((e) => showStatus(e.message, true));
      el('createEventBtn').onclick = () => createEvent().catch((e) => showStatus(e.message, true));
      el('joinEventBtn').onclick = () => joinEvent(el('joinCode').value).catch((e) => showStatus(e.message, true));
      el('refreshEventsBtn').onclick = () => refreshEvents().catch((e) => showStatus(e.message, true));

      try {
        await refreshMe();
        await refreshEvents();
        if (state.selectedCode) {
          await openEvent(state.selectedCode, false);
        }
      } catch (error) {
        showStatus(error.message || 'Erreur de démarrage', true);
      }
    }

    boot();
  </script>
</body>
</html>

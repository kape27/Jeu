name: Render Keepalive

on:
  schedule:
    # Every 10 minutes to reduce free-plan cold starts.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: |
          set -euo pipefail
          URL="https://jeu-points.onrender.com/health"
          echo "Pinging $URL"
          curl --retry 3 --retry-delay 2 --retry-all-errors --max-time 20 -fsS "$URL"
